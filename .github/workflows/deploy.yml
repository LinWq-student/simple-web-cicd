name: CI/CD Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /root || exit
            git clone https://github.com/${{ github.repository }}.git /root/app || (cd /root/app && git pull)
            cd /root/app
            docker stop simple-web-app || true
            docker rm simple-web-app || true
            docker build -t simple-web-app .
            docker run -d -p 5000:5000 --name simple-web-app --restart always simple-web-app
